<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏦 MaBanque - Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-4xl w-full">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🏦</div>
            <h1 class="text-4xl font-bold text-gray-800">MaBanque</h1>
            <p class="text-gray-500 mt-2">Gestion de comptes bancaires en ligne</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Client -->
            <div class="border-2 border-blue-200 rounded-2xl p-6 hover:shadow-xl transition-all hover:border-blue-500">
                <div class="text-center">
                    <div class="text-5xl mb-3">👤</div>
                    <h2 class="text-2xl font-bold text-gray-800">Client</h2>
                    <p class="text-gray-500 text-sm mt-1">Accédez à votre espace personnel</p>
                </div>
                <div class="mt-6 space-y-3">
                    <a href="login.html?role=client" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl text-center transition">
                        <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
                    </a>
                    <a href="register.html?role=client" class="block w-full bg-blue-100 hover:bg-blue-200 text-blue-700 font-semibold py-3 rounded-xl text-center transition">
                        <i class="fas fa-user-plus mr-2"></i> Créer un compte
                    </a>
                </div>
            </div>

            <!-- Admin -->
            <div class="border-2 border-purple-200 rounded-2xl p-6 hover:shadow-xl transition-all hover:border-purple-500">
                <div class="text-center">
                    <div class="text-5xl mb-3">🔐</div>
                    <h2 class="text-2xl font-bold text-gray-800">Administrateur</h2>
                    <p class="text-gray-500 text-sm mt-1">Gestion complète du système</p>
                </div>
                <div class="mt-6 space-y-3">
                    <a href="login.html?role=admin" class="block w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl text-center transition">
                        <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
                    </a>
                    <a href="register.html?role=admin" class="block w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-semibold py-3 rounded-xl text-center transition">
                        <i class="fas fa-user-plus mr-2"></i> Créer un compte admin
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center text-sm text-gray-400">
            <i class="fas fa-shield-alt mr-1"></i>
            Toutes les données sont sécurisées
        </div>
    </div>
</body>
</html>
