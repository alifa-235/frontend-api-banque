<!-- register.html - Version simplifiée -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - MaBanque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="text-5xl mb-2">📝</div>
            <h1 class="text-2xl font-bold text-gray-800">Créer un compte client</h1>
            <p class="text-gray-500 text-sm">Inscrivez-vous pour accéder à vos services bancaires</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
                <input type="text" id="name" required 
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="Jean Dupont">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="votre@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" required minlength="6"
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="Minimum 6 caractères">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Type de compte</label>
                <select id="type" 
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="courant">Courant</option>
                    <option value="epargne">Épargne</option>
                </select>
            </div>
            <!-- ✅ Le champ 'role' a été SUPPRIMÉ -->

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
                <i class="fas fa-user-plus mr-2"></i>
                S'inscrire
            </button>

            <p class="text-center text-sm text-gray-500 mt-4">
                Déjà un compte ? 
                <a href="login.html" class="text-blue-600 hover:underline">Se connecter</a>
            </p>
        </form>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm"></div>
    </div>

    <script>
        const API_URL = 'https://banque-api-45tc.onrender.com';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const type = document.getElementById('type').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                // ✅ Role 'client' est FORCÉ côté serveur, donc on ne l'envoie pas
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        clientName: name, 
                        clientEmail: email, 
                        password, 
                        type 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // ✅ Rediriger vers le dashboard client
                    window.location.href = 'client-dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Erreur d\'inscription';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Erreur réseau. Vérifiez votre connexion.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
