<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MaBanque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="text-5xl mb-2">🔐</div>
            <h1 class="text-2xl font-bold text-gray-800">Connexion</h1>
            <p class="text-gray-500 text-sm">Connectez-vous à votre espace</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="votre@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" required 
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Se connecter
            </button>

            <p class="text-center text-sm text-gray-500 mt-4">
                Pas encore de compte ? 
                <a href="register.html" class="text-blue-600 hover:underline">S'inscrire</a>
            </p>
        </form>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm"></div>
    </div>

    <script>
        // Configuration - À MODIFIER AVEC VOTRE URL RENDER
        const API_URL = 'https://banque-api-45tc.onrender.com';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientEmail: email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    if (data.data.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'client-dashboard.html';
                    }
                } else {
                    errorDiv.textContent = data.error || 'Erreur de connexion';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Erreur réseau. Vérifiez votre connexion.';
                errorDiv.classList.remove('hidden');
            }
        });

        // Récupérer le rôle depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'client';
    </script>
</body>
</html>
