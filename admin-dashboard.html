<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - MaBanque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold">🏦 MaBanque</span>
            <span class="text-xs bg-purple-600 px-2 py-1 rounded-full">Admin</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="adminName" class="text-gray-300"></span>
            <button onclick="logout()" class="text-red-400 hover:text-red-300">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-6">

        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🔐 Administration</h1>
                <p class="text-gray-500">Gestion complète des comptes bancaires</p>
            </div>
            <button onclick="openModal('create')" class="bg-purple-600 text-white px-6 py-3 rounded-xl hover:bg-purple-700 transition">
                <i class="fas fa-plus-circle mr-2"></i>
                Nouveau compte
            </button>
        </div>

        <!-- Statistiques -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm">Total comptes</p>
                <p class="text-2xl font-bold" id="totalAccounts">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm">Solde total</p>
                <p class="text-2xl font-bold text-green-600" id="totalBalance">0 XAF</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm">Comptes actifs</p>
                <p class="text-2xl font-bold text-blue-600" id="activeAccounts">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm">Administrateurs</p>
                <p class="text-2xl font-bold text-purple-600" id="adminCount">0</p>
            </div>
        </div>

        <!-- Filtres -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-wrap gap-4 items-center">
            <div>
                <label class="text-sm text-gray-500">Type</label>
                <select id="filterType" onchange="loadAccounts()" class="ml-2 border border-gray-300 rounded-lg px-3 py-1.5">
                    <option value="">Tous</option>
                    <option value="courant">Courant</option>
                    <option value="epargne">Épargne</option>
                </select>
            </div>
            <div>
                <label class="text-sm text-gray-500">Statut</label>
                <select id="filterStatus" onchange="loadAccounts()" class="ml-2 border border-gray-300 rounded-lg px-3 py-1.5">
                    <option value="">Tous</option>
                    <option value="active">Actif</option>
                    <option value="inactive">Inactif</option>
                    <option value="blocked">Bloqué</option>
                </select>
            </div>
            <button onclick="loadAccounts()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                <i class="fas fa-search"></i> Filtrer
            </button>
        </div>

        <!-- Liste des comptes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Client</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Compte</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rôle</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Solde</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="accountsTableBody">
                        <tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== MODALS ===== -->

    <!-- Modal Création -->
    <div id="modal-create" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">📝 Créer un compte</h3>
            <form onsubmit="adminCreateAccount(event)">
                <input type="text" id="createName" placeholder="Nom complet" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                <input type="email" id="createEmail" placeholder="Email" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                <input type="password" id="createPassword" placeholder="Mot de passe" required minlength="6"
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                <select id="createType" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                    <option value="courant">Courant</option>
                    <option value="epargne">Épargne</option>
                </select>
                <select id="createRole" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                    <option value="client">Client</option>
                    <option value="admin">Administrateur</option>
                </select>
                <input type="number" id="createBalance" placeholder="Solde initial" value="0"
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                <div class="flex gap-2">
                    <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-xl flex-1 hover:bg-purple-700">Créer</button>
                    <button type="button" onclick="closeModal('create')" class="bg-gray-300 px-6 py-2 rounded-xl hover:bg-gray-400">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Virement Admin -->
    <div id="modal-admin-transfer" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">🔄 Virement Admin</h3>
            <form onsubmit="executeAdminTransfer(event)">
                <input type="hidden" id="adminTransferFrom">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Compte source</label>
                    <input type="text" id="adminTransferFromDisplay" disabled
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email du destinataire</label>
                    <input type="email" id="adminTransferTo" placeholder="email@destinataire.com" required
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Montant (XAF)</label>
                    <input type="number" id="adminTransferAmount" placeholder="Montant" required min="100" step="100"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" id="adminTransferDesc" placeholder="Description (optionnel)"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3">
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-xl flex-1 hover:bg-purple-700">
                        <i class="fas fa-exchange-alt mr-2"></i> Effectuer
                    </button>
                    <button type="button" onclick="closeModal('admin-transfer')" class="bg-gray-300 px-6 py-2 rounded-xl hover:bg-gray-400">
                        Annuler
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://banque-api-45tc.onrender.com';

        let accounts = [];

        // ============================================================
        // UTILITAIRES
        // ============================================================

        function getToken() { return localStorage.getItem('token'); }
        function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function closeModal(name) {
            document.getElementById(`modal-${name}`).classList.add('hidden');
        }

        function openModal(name) {
            document.getElementById(`modal-${name}`).classList.remove('hidden');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 p-4 rounded-xl text-white z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ============================================================
        // API REQUEST
        // ============================================================

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const token = getToken();
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                return await response.json();
            } catch (error) {
                showToast('❌ Erreur réseau', 'error');
                return { success: false };
            }
        }

        // ============================================================
        // CHARGEMENT DES COMPTES
        // ============================================================

        async function loadAccounts() {
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;
            
            let url = '/api/admin/accounts';
            const params = [];
            if (type) params.push(`type=${type}`);
            if (status) params.push(`status=${status}`);
            if (params.length) url += '?' + params.join('&');

            const data = await apiRequest(url);
            accounts = data.data || [];
            
            // Stats
            document.getElementById('totalAccounts').textContent = accounts.length;
            const totalBalance = accounts.reduce((sum, a) => sum + a.balance, 0);
            document.getElementById('totalBalance').textContent = totalBalance.toLocaleString() + ' XAF';
            document.getElementById('activeAccounts').textContent = accounts.filter(a => a.status === 'active').length;
            document.getElementById('adminCount').textContent = accounts.filter(a => a.role === 'admin').length;

            // Tableau
            const tbody = document.getElementById('accountsTableBody');
            if (accounts.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">Aucun compte trouvé</td></tr>`;
                return;
            }

            tbody.innerHTML = accounts.map(a => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <p class="font-medium">${a.clientName}</p>
                        <p class="text-sm text-gray-500">${a.clientEmail}</p>
                    </td>
                    <td class="px-6 py-4 text-sm">${a.accountNumber}</td>
                    <td class="px-6 py-4 text-sm capitalize">${a.type}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs ${a.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                            ${a.role === 'admin' ? '🔐 Admin' : '👤 Client'}
                        </span>
                    </td>
                    <td class="px-6 py-4 font-medium ${a.balance >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ${a.balance.toLocaleString()} XAF
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs ${a.status === 'active' ? 'bg-green-100 text-green-700' : a.status === 'blocked' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'}">
                            ${a.status}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="adminDeposit('${a.id}')" class="text-green-600 hover:text-green-800" title="Dépôt">
                                <i class="fas fa-arrow-down"></i>
                            </button>
                            <button onclick="adminWithdraw('${a.id}')" class="text-red-600 hover:text-red-800" title="Retrait">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                            <button onclick="openAdminTransfer('${a.id}')" class="text-purple-600 hover:text-purple-800" title="Virement">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            <button onclick="adminDelete('${a.id}')" class="text-red-500 hover:text-red-700" title="Supprimer">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================================
        // CRÉATION DE COMPTE (ADMIN)
        // ============================================================

        async function adminCreateAccount(e) {
            e.preventDefault();
            const data = await apiRequest('/api/admin/accounts', 'POST', {
                clientName: document.getElementById('createName').value,
                clientEmail: document.getElementById('createEmail').value,
                password: document.getElementById('createPassword').value,
                type: document.getElementById('createType').value,
                role: document.getElementById('createRole').value,
                initialDeposit: parseFloat(document.getElementById('createBalance').value) || 0
            });

            if (data.success) {
                showToast('✅ Compte créé !');
                closeModal('create');
                loadAccounts();
            } else {
                showToast('❌ ' + (data.error || 'Erreur'), 'error');
            }
        }

        // ============================================================
        // DÉPÔT (ADMIN)
        // ============================================================

        async function adminDeposit(id) {
            const amount = prompt('Montant du dépôt (XAF):');
            if (!amount || isNaN(amount)) return;
            const data = await apiRequest('/api/admin/deposit', 'POST', {
                accountId: id,
                amount: parseFloat(amount),
                description: 'Dépôt administrateur'
            });
            if (data.success) {
                showToast('✅ Dépôt effectué');
                loadAccounts();
            } else {
                showToast('❌ ' + (data.error || 'Erreur'), 'error');
            }
        }

        // ============================================================
        // RETRAIT (ADMIN)
        // ============================================================

        async function adminWithdraw(id) {
            const amount = prompt('Montant du retrait (XAF):');
            if (!amount || isNaN(amount)) return;
            const data = await apiRequest('/api/admin/withdraw', 'POST', {
                accountId: id,
                amount: parseFloat(amount),
                description: 'Retrait administrateur'
            });
            if (data.success) {
                showToast('✅ Retrait effectué');
                loadAccounts();
            } else {
                showToast('❌ ' + (data.error || 'Erreur'), 'error');
            }
        }

        // ============================================================
        // VIREMENT (ADMIN)
        // ============================================================

        function openAdminTransfer(fromId) {
            const account = accounts.find(a => a.id === fromId);
            if (!account) {
                showToast('❌ Compte non trouvé', 'error');
                return;
            }
            
            document.getElementById('adminTransferFrom').value = fromId;
            document.getElementById('adminTransferFromDisplay').value = 
                `${account.clientName} (${account.accountNumber}) - ${account.balance.toLocaleString()} XAF`;
            openModal('admin-transfer');
        }

        async function executeAdminTransfer(e) {
            e.preventDefault();
            const fromId = document.getElementById('adminTransferFrom').value;
            const toEmail = document.getElementById('adminTransferTo').value.trim();
            const amount = parseFloat(document.getElementById('adminTransferAmount').value);
            const description = document.getElementById('adminTransferDesc').value || 'Virement administrateur';

            // Trouver le destinataire
            const toAccount = accounts.find(a => a.clientEmail === toEmail);
            if (!toAccount) {
                showToast('❌ Destinataire non trouvé', 'error');
                return;
            }

            if (toAccount.id === fromId) {
                showToast('❌ Impossible de virer vers le même compte', 'error');
                return;
            }

            const data = await apiRequest('/api/admin/transfer', 'POST', {
                fromAccountId: fromId,
                toAccountId: toAccount.id,
                amount,
                description
            });

            if (data.success) {
                showToast('✅ Virement effectué !');
                closeModal('admin-transfer');
                loadAccounts();
            } else {
                showToast('❌ ' + (data.error || 'Erreur'), 'error');
            }
        }

        // ============================================================
        // SUPPRESSION (ADMIN)
        // ============================================================

        async function adminDelete(id) {
            if (!confirm('Confirmer la suppression du compte ?')) return;
            const data = await apiRequest(`/api/admin/accounts/${id}`, 'DELETE');
            if (data.success) {
                showToast('✅ Compte supprimé');
                loadAccounts();
            } else {
                showToast('❌ ' + (data.error || 'Erreur'), 'error');
            }
        }

        // ============================================================
        // INITIALISATION
        // ============================================================

        // Vérification de session
        if (!getToken()) {
            window.location.href = 'login.html';
        } else if (getUser().role !== 'admin') {
            window.location.href = 'client-dashboard.html';
        }

        document.getElementById('adminName').textContent = getUser().name || 'Admin';
        loadAccounts();
    </script>
</body>
</html>
